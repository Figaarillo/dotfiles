version: "3.1"

services:
  app_db:
    image: mysql:5.7
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./my.cnf:/etc/mysql/my.cnf
    command: --init-file /docker-entrypoint-initdb-initdb.d/init.sql
    ports:
      - "3312:3306"
    environment:
        MYSQL_DATABASE: app_db
        MYSQL_ROOT_USER: figarillo
        MYSQL_USER: figarillo
        MYSQL_ROOT_PASSWORD: secret
        MYSQL_PASSWORD: secret
