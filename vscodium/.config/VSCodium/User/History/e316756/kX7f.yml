version: '3.1'

services:
  app_db:
    image: mysql:5.7
    volumes:
      - ./database/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --init-file /docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: app_db
      MYSQL_ROOT_USER: admin
      MYSQL_USER: figarillo
      MYSQL_ROOT_PASSWORD: 1258
      MYSQL_PASSWORD: 1258
